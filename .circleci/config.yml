# CircleCI automatically reads this file from our repo and uses it for
# configuration. Docs:
# https://circleci.com/docs/2.0/configuration-reference/
# https://circleci.com/docs/2.0/sample-config/
version: 2.1

jobs:
  build:
    parameters:
      # how to install dependencies:
      # * pinned: requirements.txt versions
      # * lowest-direct: pyproject.toml versions, lowest possible versions
      #   at or above our declared version specifiers
      deps:
        type: enum
        enum: [pinned, lowest-direct]

    docker:
      # https://circleci.com/developer/orbs/orb/circleci/gcp-cli#executors-google
      - image: cimg/python:3.12

    steps:
      - checkout

      - restore_cache:
          keys:
            - venv-10-{{ .Branch }}-<< parameters.deps >>

      - run:
          name: Install dependencies
          command: |
            sudo apt-get update
            sudo apt-get -y install automake libtool pkg-config

            pip install -U uv

            case "<< parameters.deps >>" in
              pinned)
                # force our own packages to reinstall at head from the git refs
                uv pip uninstall --system brevity lexrpc oauth-dropins pywebutil || true
                uv pip install --system -r requirements.txt
                # test-only deps (mox3, mf2py); --no-sources since sibling repos
                # aren't checked out in CI
                uv pip install --system --no-sources '.[tests]'
                ;;
              lowest-direct)
                # resolve third-party packages at lowest-direct floors
                uv pip install --system --no-sources --resolution=lowest-direct '.[app,tests]'
                # reinstall own packages at head, overriding PyPI floor versions
                grep 'git+' requirements.txt | xargs uv pip install --system --no-sources
                ;;
            esac

            uv pip install --system coverage coveralls flake8

      - run:
          name: Run tests
          no_output_timeout: 30m
          command: |
            python -m coverage run --source=. --omit=appengine_config.py,cron.py,granary/generated/\*,granary/tests/\*,oauth-dropins/\*,test_\*,\*_live_test.py -m unittest discover -v
            # disabled for now, fails much of the time due to IG blocking us
            # PYTHONPATH= python3 ./instagram_live_test.py --debug
            python -m coverage html -d /tmp/coverage_html
            if [ "$COVERALLS_REPO_TOKEN" != "" ]; then python3 -m coveralls || true; fi

            # check for unintentionally overridden test methods
            # https://flake8.pycqa.org/en/latest/user/error-codes.html#error-codes
            # https://flake8.pycqa.org/en/latest/user/options.html#cmdoption-flake8-select
            python -m flake8 --select=F811 granary/tests/test_*.py

      # # TODO: this is continuous deploy. find a way to get all of the API keys
      # # into circle - env var? - then re-enable this.
      # #
      # # only runs if all previous steps succeed, including tests
      # # https://circleci.com/docs/configuration-reference/#the-when-attribute
      # - run:
      #     name: Deploy
      #     command: |
      #       echo $CIRCLE_BRANCH
      #       if [ $CIRCLE_BRANCH = "main" ]; then
      #         echo $FLASK_SECRET_KEY > flask_secret_key
      #         echo $GCLOUD_SERVICE_KEY | gcloud auth activate-service-account --key-file=-
      #         gcloud -q app deploy --no-cache --project granary-demo app.yaml index.yaml
      #       fi

      - save_cache:
          key: venv-10-{{ .Branch }}-<< parameters.deps >>
          paths:
            - /home/circleci/.pyenv

      - store_artifacts:
          path: /tmp/coverage_html

workflows:
  build:
    jobs:
      # runs the job twice in parallel, once per deps strategy; both must pass
      - build:
          matrix:
            parameters:
              deps: [pinned, lowest-direct]
